apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: observability
  labels:
    app: alloy
    app.kubernetes.io/managed-by: bytesail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy
  labels:
    app: alloy
    app.kubernetes.io/managed-by: bytesail
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints", "pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy
  labels:
    app: alloy
    app.kubernetes.io/managed-by: bytesail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: observability
  labels:
    app: alloy
data:
  config.alloy: |
    // Kubernetes pod discovery
    discovery.kubernetes "pods" {
      role = "pod"
    }

    // Relabel to extract ByteSail labels and standard metadata
    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      // Drop pods in kube-system and observability namespaces
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        regex         = "kube-system|observability"
        action        = "drop"
      }

      // Set namespace label
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      // Set pod name label
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      // Set container name label
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }

      // Set node name label
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "node"
      }

      // Extract ByteSail service ID
      rule {
        source_labels = ["__meta_kubernetes_pod_label_bytesail_io_service"]
        target_label  = "bytesail_service"
      }

      // Extract ByteSail project from namespace (project-<slug>)
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        regex         = "project-(.*)"
        target_label  = "bytesail_project"
      }

      // Extract app label as fallback service identifier
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }

      // Set the log file path
      rule {
        source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
        separator     = "/"
        target_label  = "__path__"
        replacement   = "/var/log/pods/*$1/$2/*.log"
      }
    }

    // Collect logs from discovered pods
    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.process.pipeline.receiver]
    }

    // Log processing pipeline
    loki.process "pipeline" {
      // Detect log level from line content
      stage.regex {
        expression = "(?i)\\b(?P<level>debug|info|warn(?:ing)?|error|fatal|panic|critical)\\b"
      }

      stage.labels {
        values = {
          level = "",
        }
      }

      // Default level to "info" if not detected
      stage.label_drop {
        values = ["level"]
      }

      stage.static_labels {
        values = {
          cluster = "bytesail",
        }
      }

      forward_to = [loki.write.default.receiver]
    }

    // Send logs to Loki
    loki.write "default" {
      endpoint {
        url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: observability
  labels:
    app: alloy
    app.kubernetes.io/managed-by: bytesail
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      tolerations:
        - operator: Exists
      containers:
        - name: alloy
          image: grafana/alloy:v1.8.3
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
            - --server.http.listen-addr=0.0.0.0:12345
            - --stability.level=generally-available
          ports:
            - containerPort: 12345
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: data
              mountPath: /var/lib/alloy/data
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: data
          hostPath:
            path: /var/lib/alloy/data
---
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: observability
  labels:
    app: alloy
spec:
  type: ClusterIP
  ports:
    - port: 12345
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: alloy
