apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observability
  labels:
    app: alertmanager
    app.kubernetes.io/managed-by: bytesail
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ["alertname", "namespace", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "default"
      routes:
        - receiver: "critical"
          match:
            severity: critical
          repeat_interval: 1h

    receivers:
      - name: "default"
        webhook_configs:
          - url: "http://bytesail.bytesail-system.svc.cluster.local/api/v1/webhooks/alertmanager"
            send_resolved: true
      - name: "critical"
        webhook_configs:
          - url: "http://bytesail.bytesail-system.svc.cluster.local/api/v1/webhooks/alertmanager"
            send_resolved: true

    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ["alertname", "namespace"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: observability
  labels:
    app: prometheus
    app.kubernetes.io/managed-by: bytesail
data:
  bytesail-alerts.yml: |
    groups:
      - name: bytesail.service
        rules:
          - alert: ServiceDown
            expr: kube_deployment_status_replicas_available == 0 and kube_deployment_spec_replicas > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.deployment }} has no available replicas"
              description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has 0 available replicas for more than 1 minute."

          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"
              description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in the last 15 minutes."

          - alert: PodNotReady
            expr: kube_pod_status_ready{condition="true"} == 0 and kube_pod_status_phase{phase="Running"} == 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is not ready"
              description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been running but not ready for more than 5 minutes."

          - alert: DeploymentReplicaMismatch
            expr: kube_deployment_spec_replicas != kube_deployment_status_ready_replicas
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.deployment }} replica mismatch"
              description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has {{ $value }} ready replicas but {{ $labels.spec_replicas }} desired."

      - name: bytesail.node
        rules:
          - alert: NodeHighCPU
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Node {{ $labels.instance }} CPU usage above 85%"
              description: "Node {{ $labels.instance }} has sustained CPU usage of {{ $value | printf \"%.1f\" }}% for 10 minutes."

          - alert: NodeHighMemory
            expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Node {{ $labels.instance }} memory usage above 90%"
              description: "Node {{ $labels.instance }} memory usage is {{ $value | printf \"%.1f\" }}%."

          - alert: NodeHighMemoryCritical
            expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 95
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.instance }} memory critically high at {{ $value | printf \"%.1f\" }}%"

          - alert: NodeDiskFull
            expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Node {{ $labels.instance }} disk usage above 85%"
              description: "Root filesystem on {{ $labels.instance }} is {{ $value | printf \"%.1f\" }}% full."

          - alert: NodeDiskCritical
            expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 95
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.instance }} disk critically full at {{ $value | printf \"%.1f\" }}%"

      - name: bytesail.container
        rules:
          - alert: ContainerHighCPU
            expr: sum(rate(container_cpu_usage_seconds_total{container!="", container!="POD"}[5m])) by (namespace, pod, container) > 0.9
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.container }} in {{ $labels.pod }} using >90% CPU"

          - alert: ContainerHighMemory
            expr: container_memory_working_set_bytes{container!="", container!="POD"} / container_spec_memory_limit_bytes > 0.9 and container_spec_memory_limit_bytes > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.container }} in {{ $labels.pod }} using >90% memory limit"

          - alert: ContainerOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Container {{ $labels.container }} in {{ $labels.pod }} was OOM killed"

      - name: bytesail.pvc
        rules:
          - alert: PVCAlmostFull
            expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100 > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | printf \"%.1f\" }}% full"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app: alertmanager
    app.kubernetes.io/managed-by: bytesail
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      securityContext:
        fsGroup: 65534
        runAsUser: 65534
        runAsGroup: 65534
        runAsNonRoot: true
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.28.1
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --web.listen-address=:9093
          ports:
            - containerPort: 9093
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: alertmanager
