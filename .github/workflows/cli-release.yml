name: CLI Release

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/cli

      - name: Build binaries
        run: |
          mkdir -p dist
          bun build src/index.ts --compile --target=bun-linux-x64 --outfile=dist/bytesail-linux-x64
          bun build src/index.ts --compile --target=bun-linux-arm64 --outfile=dist/bytesail-linux-arm64
          bun build src/index.ts --compile --target=bun-darwin-x64 --outfile=dist/bytesail-darwin-x64
          bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile=dist/bytesail-darwin-arm64
          bun build src/index.ts --compile --target=bun-windows-x64 --outfile=dist/bytesail-windows-x64.exe
        working-directory: apps/cli

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CLI ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            apps/cli/dist/bytesail-linux-x64
            apps/cli/dist/bytesail-linux-arm64
            apps/cli/dist/bytesail-darwin-x64
            apps/cli/dist/bytesail-darwin-arm64
            apps/cli/dist/bytesail-windows-x64.exe
