apiVersion: batch/v1
kind: CronJob
metadata:
  name: update-checker
  namespace: bytesail-system
  labels:
    app: bytesail
    component: update-checker
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 300
      template:
        metadata:
          labels:
            app: bytesail
            component: update-checker
        spec:
          restartPolicy: Never
          containers:
            - name: update-checker
              image: curlimages/curl:8.11.1
              command:
                - /bin/sh
                - -c
                - |
                  curl -sf http://bytesail.bytesail-system.svc.cluster.local/api/v1/update/check || true
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
