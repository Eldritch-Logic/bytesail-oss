name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  ci:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm vitest run --exclude='**/integration.test.ts'

  build-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BYTESAIL_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-cli:
    name: Build CLI Binaries
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Build CLI binaries
        run: |
          mkdir -p dist
          bun build src/index.ts --compile --target=bun-linux-x64 --outfile=dist/bytesail-linux-x64
          bun build src/index.ts --compile --target=bun-linux-arm64 --outfile=dist/bytesail-linux-arm64
          bun build src/index.ts --compile --target=bun-darwin-x64 --outfile=dist/bytesail-darwin-x64
          bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile=dist/bytesail-darwin-arm64
          bun build src/index.ts --compile --target=bun-windows-x64 --outfile=dist/bytesail-windows-x64.exe
        working-directory: apps/cli
      - name: Generate checksums
        run: sha256sum bytesail-* > checksums.txt
        working-directory: apps/cli/dist
      - uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: |
            apps/cli/dist/bytesail-*
            apps/cli/dist/checksums.txt

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-image, build-cli]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: cli-dist

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ByteSail ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ```

            ## Install / Upgrade

            **Fresh install:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/deploy/install.sh | bash
            ```

            **Upgrade existing instance:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/deploy/install.sh | \
              BYTESAIL_UPGRADE=true BYTESAIL_VERSION=${{ steps.version.outputs.version }} bash
            ```

            ## CLI Binaries

            Download the binary for your platform from the assets below, or install via:
            ```bash
            curl -fsSL https://get.bytesail.dev/cli | bash
            ```
          files: |
            cli-dist/bytesail-linux-x64
            cli-dist/bytesail-linux-arm64
            cli-dist/bytesail-darwin-x64
            cli-dist/bytesail-darwin-arm64
            cli-dist/bytesail-windows-x64.exe
            cli-dist/checksums.txt
